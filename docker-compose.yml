version: "3.9"

services:
  app:
    build: .
    container_name: alquisearch
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite databases across container restarts
      - alquisearch_data:/app/data
    environment:
      - DB_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  alquisearch_data:
    driver: local
